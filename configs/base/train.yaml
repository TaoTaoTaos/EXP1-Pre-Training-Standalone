train:
  seed: 42
  batch_size: 64
  batch_parallel: true
  num_workers: 0
  learning_rate: 0.001
  weight_decay: 1.0e-4
  max_epochs: 50
  gradient_clip_norm: 1.0
  optimizer: "adamw"
  loss: "mse"
  huber_delta: 1.0
  physics_loss:
    enabled: false
    rule: "stefan_growth_residual"
    lambda_st: 1.0
    lambda_nn: 1.0
    init_kappa: 1.0
    min_prev_ice_m: 1.0e-3
    grow_temp_threshold_celsius: -0.5
    prev_ice_column: "ice_prev_m"
    gap_days_column: "ice_prev_gap_days"
    temperature_column: "Air_Temperature_celsius"
    prev_available_column: "ice_prev_available"
  device: "auto"
  early_stopping:
    patience: 15
    min_delta: 1.0e-5
  scheduler:
    name: "none"
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6
