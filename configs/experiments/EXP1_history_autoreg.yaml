# EXP1：历史冰厚特征 + 自回归 seasonal rollout
# 这个文件作为主实验配置使用，常调参数尽量都显式写在这里，
# 后续调参时优先直接修改本文件，不再依赖长名字配置去“间接继承”。

experiment:
  name: "EXP1_history_autoreg"
  description: "实验1：加入历史冰厚特征，并使用自回归 seasonal rollout 作为唯一测试方式。"

paths:
  # 原始观测与 ERA5 融合后的实验输入文件
  raw_excel: "data/raw/LakeIce_ERA5_less60_XiaoxingkaiDaily12.xlsx"

  # 下面这些路径都按 EXP1 单独存放，避免和其他实验混用
  prepared_csv: "data/interim/prepared_data_EXP1_history_autoreg.csv"
  validation_report_json: "data/artifacts/EXP1_history_autoreg_validation_report.json"
  feature_schema_json: "data/artifacts/EXP1_history_autoreg_feature_schema.json"
  split_root: "data/splits_EXP1_history_autoreg"
  window_root: "data/windows_EXP1_history_autoreg"
  coeff_root: "data/coeffs_EXP1_history_autoreg"
  artifact_root: "data/artifacts/EXP1_history_autoreg"
  output_root: "outputs/runs"

data:
  # Excel 工作表与主字段定义
  excel_sheet_name: "lakeice_era5"
  lake_column: "lake_name"
  lake_id_column: "lake_id"
  datetime_column: "sample_datetime"
  era5_datetime_column: "era5_datetime"
  target_column: "total_ice_m"
  doy_column: "doy"
  latitude_column: "latitude"
  longitude_column: "longitude"

  # null 表示使用全部湖泊；如需只跑部分湖，可以改成列表
  include_lakes: null

features:
  # Neural CDE 的时间通道名
  time_channel_name: "relative_time"

  # 周期特征列，用于把年内日期编码为连续变量
  cyclical_columns:
    - "doy_sin"
    - "doy_cos"

  # 实际送入模型的输入特征
  feature_columns:
  #  - "doy_sin"
  #  - "doy_cos"
    - "Ten_Meter_Elevation_Wind_Speed_meterPerSecond"
    - "Air_Temperature_celsius"
    - "Relative_Humidity_percent"
    - "Shortwave_Radiation_Downwelling_wattPerMeterSquared"
    - "Longwave_Radiation_Downwelling_wattPerMeterSquared"
    - "Sea_Level_Barometric_Pressure_pascal"
    - "Surface_Level_Barometric_Pressure_pascal"
    - "Precipitation_millimeterPerDay"
    - "Snowfall_millimeterPerDay"
    ################
    - "ice_prev_m"
    - "ice_prev_gap_days"
    - "ice_prev_available"

  # 目标变量变换；当前保持原始冰厚单位
  target_transform: "none"

  # 输入标准化方式
  input_scaler: "standard"

  # 目标变量不作为输入特征直接喂给模型
  exclude_target_from_inputs: true

split:
  strategy: "time_holdout"
  name: "EXP1_history_autoreg_reference"
  seed: 42

custom_split:
  # 每个训练湖按时间顺序切分 train/val
  val_fraction: 0.1
  min_val_rows_per_lake: 8
  min_train_rows_per_lake: 24

  # 为了平衡不同湖的样本量，对训练和验证窗口做上限裁剪
  max_train_windows_per_lake: 160
  max_val_windows_per_lake: 20

  # 目标湖从这个日期起不再参与 train/val，只保留作后续 rollout 观测对照
  target_lake_test_start: "2026-01-01"

coeffs:
  interpolation: "hermite"

seasonal_rollout:
  # 当前项目里唯一 test 方式：连续 ERA5 forcing 的自回归 rollout
  enabled: true
  autoregressive_history: true
  target_lake_name: "Xiaoxingkai"
  era5_csv: "data/raw/XXKH-St-UTC+8-ERA5-1980-202603-noNA.csv"

  # rollout 真正从哪一天开始启动测试
  # 这个日期越早，累计滚动链越长，到 2026 年 1 月实测期的表现可能会变化
  test_start_datetime: "2025-10-01 12:00:00"
  end_datetime: "2026-03-31 12:00:00"

  # 每天只取 ERA5 的这个时刻作为驱动输入
  daily_hour: 12

window:
  # 每个锚点向前回看多少天构造不规则时间窗
  window_days: 45
  min_points: 2
  anchor_on_every_observation: true
  save_raw_windows: true

model:
  # Neural CDE 主体结构
  hidden_channels: 48
  hidden_hidden_channels: 96
  num_hidden_layers: 2
  dropout: 0.1

  # ODE/CDE 求解器
  method: "midpoint"
  use_adjoint: false

  # 输出冰厚保持非负
  nonnegative_output: true

train:
  # 随机种子与硬件
  seed: 42
  device: "auto"

  # dataloader / batch
  batch_size: 64
  batch_parallel: true
  num_workers: 0

  # 优化器
  optimizer: "adamw"
  learning_rate: 2.0e-4
  weight_decay: 5.0e-4
  max_epochs: 120
  gradient_clip_norm: 0.5

  # 主监督损失
  loss: "huber"
  huber_delta: 0.1

  # 物理损失在 EXP1 中默认关闭；EXP2 会在这里基础上开启并覆写参数
  physics_loss:
    enabled: false
    rule: "stefan_growth_residual"
    lambda_st: 1.0
    lambda_nn: 1.0
    init_kappa: 1.0
    min_prev_ice_m: 1.0e-3
    grow_temp_threshold_celsius: -0.5
    prev_ice_column: "ice_prev_m"
    gap_days_column: "ice_prev_gap_days"
    temperature_column: "Air_Temperature_celsius"
    prev_available_column: "ice_prev_available"

  # early stopping
  early_stopping:
    patience: 20
    min_delta: 1.0e-5

  # 学习率调度器
  scheduler:
    name: "reduce_on_plateau"
    factor: 0.5
    patience: 8
    min_lr: 1.0e-5

eval:
  # 报告与调试图的控制参数
  plot_sample_windows: 4
  interpolation_debug_points: 100
  prediction_clip_min: 0.0
  metrics:
    - "rmse"
    - "mae"
    - "r2"
    - "bias"
    - "negative_count"
