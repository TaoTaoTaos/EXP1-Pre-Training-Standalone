experiment:
  name: "xiaoxingkai_transfer"
  description: "Train on source lakes and evaluate transfer to held-out Xiaoxingkai."

paths:
  raw_excel: "data/raw/LakeIce_ERA5_less60_NormalizedNames.xlsx"
  prepared_csv: "data/interim/prepared_data_xiaoxingkai_transfer.csv"
  validation_report_json: "data/artifacts/xiaoxingkai_transfer_validation_report.json"
  feature_schema_json: "data/artifacts/xiaoxingkai_transfer_feature_schema.json"
  split_root: "data/splits_xiaoxingkai_transfer"
  window_root: "data/windows_xiaoxingkai_transfer"
  coeff_root: "data/coeffs_xiaoxingkai_transfer"
  artifact_root: "data/artifacts/xiaoxingkai_transfer"
  output_root: "outputs/runs"

data:
  include_lakes:
    - "【Huo】Lake Hnagzhang"
    - "【Huo】Lake Ulansu"
    - "【Li】Lake Xiaoxingkai"
    - "【North Temperate Lakes LTER】Crystal Lake (NTL)"
    - "【North Temperate Lakes LTER】Bog 27-2 (Crystal Bog)"
    - "【North Temperate Lakes LTER】Sparkling Lake"
    - "【North Temperate Lakes LTER】Big Muskellunge Lake"
    - "【North Temperate Lakes LTER】Allequash Lake"
    - "【North Temperate Lakes LTER】Bog 12-15 (Trout Bog)"
    - "【North Temperate Lakes LTER】Trout Lake"
    - "【IISD Experimental】Lake 239"
    - "【IISD Experimental】Lake 302"

features:
  feature_columns:
    - "doy_sin"
    - "doy_cos"
    - "Ten_Meter_Elevation_Wind_Speed_meterPerSecond"
    - "Air_Temperature_celsius"
    - "Relative_Humidity_percent"
    - "Shortwave_Radiation_Downwelling_wattPerMeterSquared"
    - "Longwave_Radiation_Downwelling_wattPerMeterSquared"
    - "Sea_Level_Barometric_Pressure_pascal"
    - "Surface_Level_Barometric_Pressure_pascal"
    - "Precipitation_millimeterPerDay"
    - "Snowfall_millimeterPerDay"
  target_transform: "none"

split:
  strategy: "time_holdout"
  name: "xiaoxingkai_transfer_reference"
  seed: 42

coeffs:
  interpolation: "hermite"

custom_split:
  val_fraction: 0.1
  min_val_rows_per_lake: 8
  min_train_rows_per_lake: 24
  max_train_windows_per_lake: 160
  max_val_windows_per_lake: 20

window:
  window_days: 15

model:
  hidden_channels: 48
  hidden_hidden_channels: 96
  num_hidden_layers: 2
  dropout: 0.1
  method: "rk4"

train:
  batch_size: 64
  batch_parallel: true
  learning_rate: 2.0e-4
  weight_decay: 5.0e-4
  max_epochs: 120
  gradient_clip_norm: 0.5
  loss: "huber"
  huber_delta: 0.1
  early_stopping:
    patience: 20
    min_delta: 1.0e-5
  scheduler:
    name: "reduce_on_plateau"
    factor: 0.5
    patience: 8
    min_lr: 1.0e-5
