extends: "EXP0_pretrain_autoreg.yaml"

experiment:
  name: "EXP2_transfer_autoreg_stefan"
  description: "Experiment 2: transfer learning with Xiaoxingkai history before the cutoff plus Stefan-style physics loss."

paths:
  prepared_csv: "data/interim/prepared_data_EXP2_transfer_autoreg_stefan.csv"
  validation_report_json: "data/artifacts/EXP2_transfer_autoreg_stefan_validation_report.json"
  feature_schema_json: "data/artifacts/EXP2_transfer_autoreg_stefan_feature_schema.json"
  split_root: "data/splits_EXP2_transfer_autoreg_stefan"
  window_root: "data/windows_EXP2_transfer_autoreg_stefan"
  coeff_root: "data/coeffs_EXP2_transfer_autoreg_stefan"
  artifact_root: "data/artifacts/EXP2_transfer_autoreg_stefan"

split:
  name: "EXP2_transfer_autoreg_stefan_reference"

custom_split:
  target_lake_test_start: "2026-01-01"

train:
  physics_loss:
    enabled: true
    rule: "stefan_growth_residual"
    lambda_st: 0.02
    lambda_nn: 1.0
    init_kappa: 0.0085
    min_prev_ice_m: 1.0e-3
    grow_temp_threshold_celsius: -0.5
    prev_ice_column: "ice_prev_m"
    gap_days_column: "ice_prev_gap_days"
    temperature_column: "Air_Temperature_celsius"
    prev_available_column: "ice_prev_available"
