experiment:
  name: "xiaoxingkai_transfer_daily12_history_autoreg"
  description: "Train with lagged ice-history channels and evaluate Xiaoxingkai with both holdout-test and autoregressive seasonal rollout."

paths:
  raw_excel: "data/raw/LakeIce_ERA5_less60_XiaoxingkaiDaily12.xlsx"
  prepared_csv: "data/interim/prepared_data_xiaoxingkai_transfer_daily12_history_autoreg.csv"
  validation_report_json: "data/artifacts/xiaoxingkai_transfer_daily12_history_autoreg_validation_report.json"
  feature_schema_json: "data/artifacts/xiaoxingkai_transfer_daily12_history_autoreg_feature_schema.json"
  split_root: "data/splits_xiaoxingkai_transfer_daily12_history_autoreg"
  window_root: "data/windows_xiaoxingkai_transfer_daily12_history_autoreg"
  coeff_root: "data/coeffs_xiaoxingkai_transfer_daily12_history_autoreg"
  artifact_root: "data/artifacts/xiaoxingkai_transfer_daily12_history_autoreg"
  output_root: "outputs/runs"

data:
  include_lakes: null

features:
  feature_columns:
    - "doy_sin"
    - "doy_cos"
    - "Ten_Meter_Elevation_Wind_Speed_meterPerSecond"
    - "Air_Temperature_celsius"
    - "Relative_Humidity_percent"
    - "Shortwave_Radiation_Downwelling_wattPerMeterSquared"
    - "Longwave_Radiation_Downwelling_wattPerMeterSquared"
    - "Sea_Level_Barometric_Pressure_pascal"
    - "Surface_Level_Barometric_Pressure_pascal"
    - "Precipitation_millimeterPerDay"
    - "Snowfall_millimeterPerDay"
    - "ice_prev_m"
    - "ice_prev_gap_days"
    - "ice_prev_available"
  target_transform: "none"

split:
  strategy: "time_holdout"
  name: "xiaoxingkai_transfer_daily12_history_autoreg_reference"
  seed: 42

coeffs:
  interpolation: "hermite"

custom_split:
  val_fraction: 0.1
  min_val_rows_per_lake: 8
  min_train_rows_per_lake: 24
  max_train_windows_per_lake: 160
  max_val_windows_per_lake: 20
  target_lake_test_start: "2026-01-01"

seasonal_rollout:
  enabled: true
  autoregressive_history: true
  target_lake_name: "Xiaoxingkai"
  era5_csv: "data/raw/XXKH-St-UTC+8-ERA5-1980-202603-noNA.csv"
  test_start_datetime: "2025-10-01 12:00:00"
  end_datetime: "2026-03-31 12:00:00"
  daily_hour: 12

window:
  window_days: 45

model:
  hidden_channels: 48
  hidden_hidden_channels: 96
  num_hidden_layers: 2
  dropout: 0.1
  method: "rk4"

train:
  batch_size: 64
  batch_parallel: true
  learning_rate: 2.0e-4
  weight_decay: 5.0e-4
  max_epochs: 120
  gradient_clip_norm: 0.5
  loss: "huber"
  huber_delta: 0.1
  early_stopping:
    patience: 20
    min_delta: 1.0e-5
  scheduler:
    name: "reduce_on_plateau"
    factor: 0.5
    patience: 8
    min_lr: 1.0e-5
